sources:
  - name: rules
    path: ./docs/rules
    include:
      - "**/*.md"

  - name: poetry
    path: ./docs/poetry
    include:
      - "**/*.md"

chunking:
  # 🔪 метод разбивки (сплит по заголовкам, fallback — по символам)
  method: markdown_headers_then_fallback
  # 📏 макс. длина одного чанка в символах.
  #   Если секция длиннее — принудительно режется с overlap-ом
  chunk_size: 1200
  # 🔄 перекрытие между соседними чанками (в символах).
  #   Нужно чтобы контекст не терялся на стыках при поиске
  overlap: 200

storage:
  type: chromadb
  path: ./output/chroma_db
  collection: knowledge_base

embeddings:
  model: intfloat/multilingual-e5-large
